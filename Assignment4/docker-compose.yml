services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: go_test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/01_init.up.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
      
    environment:
      DB_HOST: db 
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: mysecretpassword
      DB_NAME: go_test
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy 

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80" 
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-app

volumes:
  pgdata: